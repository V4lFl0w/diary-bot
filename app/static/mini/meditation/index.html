<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meditation</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    :root {
      --bg: #071018;
      --panel: rgba(255,255,255,.06);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.50);
      
      --brand: #2dd4bf;
      --brand-glow: rgba(45,212,191,.2);
      --danger: #ef4444;
      --warning: #f59e0b;
      
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    
    body { 
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif; 
      margin: 0; 
      color: var(--text);
      background:
        radial-gradient(1000px 500px at 50% 0%, rgba(168,85,247,.12), transparent 60%),
        radial-gradient(800px 400px at 10% 80%, rgba(45,212,191,.10), transparent 60%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      
      /* АНТИ-ПРЫЖОК: Жестко фиксируем окно */
      height: var(--tg-viewport-stable-height, 100vh);
      min-height: 100vh;
      width: 100vw;
      overflow: hidden; 
    }

    /* Внутренний скролл */
    .app-container {
      height: 100%;
      width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(16px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    }

    .topbar {
      text-align: center;
      margin-bottom: 20px;
    }
    
    h2 { 
      margin: 0; 
      font-size: 22px; 
      font-weight: 800; 
      letter-spacing: -0.3px; 
    }

    /* Карточки-стекляшки */
    .card { 
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08); 
      border-radius: var(--radius); 
      padding: 16px; 
      margin-bottom: 12px; 
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }

    .header-card {
      text-align: center;
      padding: 24px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
      border-color: rgba(255,255,255,0.12);
    }

    .big { 
      font-size: 36px; 
      font-weight: 900; 
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    
    .status { 
      font-size: 14px; 
      color: var(--muted);
      font-weight: 500;
    }
    .status .ok { color: var(--brand); font-weight: 700; text-shadow: 0 0 8px var(--brand-glow); }
    .status .warn { color: var(--warning); font-weight: 700; }

    label { 
      font-size: 13px; 
      color: rgba(255,255,255,.8); 
      display: block; 
      margin-bottom: 10px; 
      font-weight: 600; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Сетки кнопок */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .row4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .row5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    
    .flex-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .flex-col { flex: 1; }

    /* Кнопки настроек */
    .btn { 
      touch-action: manipulation; 
      -webkit-tap-highlight-color: transparent; 
      padding: 10px 4px; 
      font-size: 13px; 
      font-weight: 600;
      border-radius: 10px; 
      border: 1px solid rgba(255,255,255,.1); 
      background: rgba(255,255,255,.05); 
      color: var(--text);
      cursor: pointer; 
      transition: all 0.15s ease;
    }
    
    .btn:active { transform: scale(0.96); }
    
    .btn.active { 
      border-color: var(--brand); 
      background: var(--brand-glow); 
      color: #fff;
      box-shadow: 0 0 12px var(--brand-glow);
    }
    
    .btn[disabled] { opacity: 0.4; cursor: not-allowed; }

    /* Инпут кастомного времени */
    #durCustom {
      width: 100%; 
      background: rgba(0,0,0,0.2);
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      padding: 12px; 
      border-radius: 10px; 
      border: 1px solid rgba(255,255,255,.15); 
      outline: none;
      display: none;
    }
    #durCustom:focus { border-color: var(--brand); }

    /* Ползунок громкости */
    input[type="range"] { 
      -webkit-appearance: none;
      appearance: none; /* <--- ДОБАВИТЬ ЭТО */
      width: 100%; 
      background: transparent;
      margin-top: 4px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none; /* <--- И ДОБАВИТЬ СЮДА */
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      margin-top: -8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }

    /* Блок плеера (управление) */
    .player-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .play-btn {
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s;
    }

    .play-btn:active:not([disabled]) { transform: scale(0.97); }
    .play-btn[disabled] { opacity: 0.3; filter: grayscale(1); }

    #startBtn, #resumeBtn {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    #pauseBtn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }

    #stopBtn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .vol-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    #volLabel {
      color: var(--brand);
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="topbar">
      <h2>🧘 Медитация</h2>
    </div>

    <div class="card header-card">
      <div class="big" id="timeLeft">Готов</div>
      <div class="status" id="status">Настрой параметры и нажми Start</div>
    </div>

    <div class="card">
      <label>⏱ Длительность (мин)</label>
      <div class="row5" id="durRow">
        <button class="btn" data-min="5">5</button>
        <button class="btn" data-min="10">10</button>
        <button class="btn" data-min="15">15</button>
        <button class="btn" data-min="20">20</button>
        <button class="btn" id="durCustomBtn">Свой</button>
      </div>
      <div style="margin-top:12px">
        <input id="durCustom" type="number" min="1" max="180" step="1" value="10" placeholder="Мин">
      </div>
    </div>

    <div class="card">
      <div class="flex-row">
        <div class="flex-col">
          <label>🎛 Режим</label>
          <div class="row3" id="modeRow" style="grid-template-columns: 1fr;">
            <button class="btn" data-mode="timer">Таймер</button>
            <button class="btn" data-mode="guided">Голос</button>
            <button class="btn" data-mode="sleep">Сон</button>
          </div>
        </div>
        <div class="flex-col">
          <label>🔔 Колокол</label>
          <div class="row" style="grid-template-columns: 1fr;">
            <button class="btn" id="bellToggle">Вкл</button>
            <button class="btn" id="testSound">Тест звука</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <label>🍃 Природа</label>
      <div class="row4" id="bgRow">
        <button class="btn" data-bg="off">Выкл</button>
        <button class="btn" data-bg="rain">Дождь</button>
        <button class="btn" data-bg="forest">Лес</button>
        <button class="btn" data-bg="white">Шум</button>
      </div>

      <label style="margin-top: 20px;">🎧 Музыка</label>
      <div class="row4" id="musicRow">
        <button class="btn" data-music="off">Выкл</button>
        <button class="btn" data-music="lofi">Lo-Fi</button>
        <button class="btn" data-music="ambient">Ambient</button>
        <button class="btn" data-music="bowls">Чаши</button>
      </div>

      <div style="margin-top: 24px">
        <div class="vol-header">
          <label style="margin:0;">🔊 Громкость</label>
          <span id="volLabel">70%</span>
        </div>
        <input id="vol" type="range" min="0" max="100" value="70">
      </div>
    </div>

    <div class="card" style="background: transparent; border: none; box-shadow: none; padding: 0;">
      <div class="player-controls">
        <button class="play-btn" id="startBtn">▶️ Start</button>
        <button class="play-btn" id="pauseBtn" disabled>⏸ Pause</button>
        <button class="play-btn" id="resumeBtn" disabled style="display:none;">▶️ Resume</button>
        <button class="play-btn" id="stopBtn" disabled>⏹ Stop</button>
      </div>
    </div>
    
    <audio id="bellStart" src="/static/sounds/meditation_start.mp3" preload="auto"></audio>
    <audio id="bellEnd" src="/static/sounds/meditation_end.mp3" preload="auto"></audio>
    <audio id="bgMusic" loop preload="none"></audio>
  </div>

  <script>
  (() => {
    // --- Твои ссылки на музыку ---
    const MUSIC_SOURCES = {
      "lofi": "/static/sounds/lofi.mp3",
      "ambient": "/static/sounds/ambient.mp3",
      "bowls": "/static/sounds/bowls.mp3"
    };

    // --- Telegram WebApp ---
    const tg = window.Telegram?.WebApp;
    try { tg?.ready?.(); tg?.expand?.(); } catch(e) {}

    function send(type, payload={}) {
      try { tg?.sendData?.(JSON.stringify({ type, ...payload })); } catch(e) {}
    }

    function qs(name, defVal=null){
      const u = new URL(window.location.href);
      return u.searchParams.get(name) ?? defVal;
    }

    // --- State ---
    const state = {
      durationMin: clampInt(parseInt(qs("duration_min","10"),10), 1, 180),
      mode: (qs("mode","timer") || "timer"),
      bg: (qs("bg","off") || "off"),
      music: "off",
      vol: clampInt(parseInt(qs("vol","70"),10), 0, 100),
      bell: (qs("bell","1") || "1") !== "0",
      running: false,
      paused: false,
      endAt: 0,
      remainingSec: 0,
    };

    // --- Elements ---
    const $timeLeft = document.getElementById("timeLeft");
    const $status = document.getElementById("status");
    const $durRow = document.getElementById("durRow");
    const $durCustomBtn = document.getElementById("durCustomBtn");
    const $durCustom = document.getElementById("durCustom");

    const $modeRow = document.getElementById("modeRow");
    const $bgRow = document.getElementById("bgRow");
    const $musicRow = document.getElementById("musicRow");
    const $bellToggle = document.getElementById("bellToggle");
    const $testSound = document.getElementById("testSound");

    const $vol = document.getElementById("vol");
    const $volLabel = document.getElementById("volLabel");

    const $startBtn = document.getElementById("startBtn");
    const $pauseBtn = document.getElementById("pauseBtn");
    const $resumeBtn = document.getElementById("resumeBtn");
    const $stopBtn = document.getElementById("stopBtn");
    
    const $bgMusic = document.getElementById("bgMusic");

    // --- Helpers ---
    function clampInt(n, lo, hi){ n = Number.isFinite(n) ? n : lo; return Math.max(lo, Math.min(hi, Math.trunc(n))); }
    function fmt(sec){
      sec = Math.max(0, Math.floor(sec));
      const m = String(Math.floor(sec/60)).padStart(2,"0");
      const s = String(sec%60).padStart(2,"0");
      return `${m}:${s}`;
    }
    function vibrate(ms){ try { navigator.vibrate?.(ms); } catch(e) {} }

    // --- WebAudio (Звуки природы) ---
    let audioCtx = null;
    let master = null;
    let bgNode = null; 

    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
        master = audioCtx.createGain();
        master.gain.value = state.vol / 100;
        master.connect(audioCtx.destination);
      }
      return audioCtx;
    }

    async function unlockAudio() {
      const ctx = ensureAudio();
      if (!ctx) return;
      try { if (ctx.state === "suspended") await ctx.resume(); } catch(e) {}
    }

    function setVolume(v) {
      state.vol = clampInt(v, 0, 100);
      $vol.value = String(state.vol);
      $volLabel.textContent = `${state.vol}%`;
      if (master) master.gain.value = state.vol / 100;
      if ($bgMusic) $bgMusic.volume = state.vol / 100;
      document.getElementById("bellStart").volume = state.vol / 100;
      document.getElementById("bellEnd").volume = state.vol / 100;
    }

    function bell(pattern="start") {
      if (!state.bell) return;
      const el = pattern === "start" ? document.getElementById("bellStart") : document.getElementById("bellEnd");
      if (!el) return;
      el.volume = state.vol / 100;
      el.currentTime = 0;
      el.play().catch(()=>{});
    }

    function stopBg() {
      try { bgNode?.stop?.(); } catch(e) {}
      bgNode = null;
    }

    function startBg(kind) {
      stopBg();
      if (kind === "off") return;
      const ctx = ensureAudio();
      if (!ctx || !master) return;

      function makeNoiseBuffer(seconds=2.0) {
        const sr = ctx.sampleRate;
        const len = Math.floor(sr * seconds);
        const buf = ctx.createBuffer(1, len, sr);
        const data = buf.getChannelData(0);
        for (let i=0;i<len;i++) data[i] = (Math.random()*2 - 1) * 0.35;
        return buf;
      }

      if (kind === "white") {
        const src = ctx.createBufferSource();
        src.buffer = makeNoiseBuffer(2.0);
        src.loop = true;
        const g = ctx.createGain();
        g.gain.value = 0.35;
        src.connect(g).connect(master);
        src.start();
        bgNode = { stop: () => { try{ src.stop(); }catch(e){} } };
      } else if (kind === "rain") {
        const src = ctx.createBufferSource();
        src.buffer = makeNoiseBuffer(2.0);
        src.loop = true;
        const lp = ctx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = 1800;
        const g = ctx.createGain();
        g.gain.value = 0.40;
        src.connect(lp).connect(g).connect(master);
        src.start();
        bgNode = { stop: () => { try{ src.stop(); }catch(e){} } };
      } else if (kind === "forest") {
        const src = ctx.createBufferSource();
        src.buffer = makeNoiseBuffer(2.0);
        src.loop = true;
        const lp = ctx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = 900;
        const g = ctx.createGain();
        g.gain.value = 0.45;
        const rumble = ctx.createOscillator();
        rumble.type = "sine";
        rumble.frequency.value = 80;
        const rg = ctx.createGain();
        rg.gain.value = 0.05;
        src.connect(lp).connect(g).connect(master);
        rumble.connect(rg).connect(master);
        src.start();
        rumble.start();
        bgNode = { stop: () => { try{ src.stop(); rumble.stop(); }catch(e){} } };
      }
    }

    function stopMusic() {
      if (!$bgMusic) return;
      $bgMusic.pause();
      $bgMusic.currentTime = 0;
    }

    function startMusic(kind) {
      if (!$bgMusic) return;
      $bgMusic.pause();
      if (kind === "off" || !MUSIC_SOURCES[kind]) return;
      
      $bgMusic.src = MUSIC_SOURCES[kind];
      $bgMusic.volume = state.vol / 100;
      $bgMusic.play().catch(e => console.log("Auto-play blocked"));
    }

    // --- UI render ---
    function setActiveButtons(container, attr, value) {
      [...container.querySelectorAll("button")].forEach(b => {
        const v = b.getAttribute(attr);
        if (v === null) return;
        b.classList.toggle("active", v === value);
      });
    }

    function setRunningUI() {
      if (state.running) {
        $startBtn.style.display = "none";
        if (state.paused) {
            $pauseBtn.style.display = "none";
            $resumeBtn.style.display = "flex";
        } else {
            $pauseBtn.style.display = "flex";
            $resumeBtn.style.display = "none";
        }
      } else {
        $startBtn.style.display = "flex";
        $pauseBtn.style.display = "flex";
        $resumeBtn.style.display = "none";
      }

      $startBtn.disabled = state.running;
      $pauseBtn.disabled = !state.running || state.paused;
      $resumeBtn.disabled = !state.running || !state.paused;
      $stopBtn.disabled = !state.running;

      $durRow.querySelectorAll("button").forEach(b => b.disabled = state.running);
      $durCustom.disabled = state.running;
      $modeRow.querySelectorAll("button").forEach(b => b.disabled = state.running);
      $bgRow.querySelectorAll("button").forEach(b => b.disabled = state.running);
      $musicRow.querySelectorAll("button").forEach(b => b.disabled = state.running);
      $bellToggle.disabled = state.running;
    }

    function updateHeader() {
      if (!state.running) {
        $timeLeft.textContent = `Длительность: ${state.durationMin} мин`;
        return;
      }
      const left = state.paused ? state.remainingSec : Math.max(0, Math.ceil((state.endAt - Date.now())/1000));
      $timeLeft.textContent = left > 0 ? `Осталось: ${fmt(left)}` : "✅ Готово";
    }

    let interval = null;
    function startTicking() {
      stopTicking();
      interval = setInterval(() => {
        if (!state.running || state.paused) return;
        const left = Math.max(0, Math.ceil((state.endAt - Date.now())/1000));
        if (left <= 0) finish();
        updateHeader();
      }, 250);
    }
    function stopTicking() {
      if (interval) clearInterval(interval);
      interval = null;
    }

    function finish() {
      state.running = false;
      state.paused = false;
      stopTicking();
      stopBg();
      stopMusic();

      $status.innerHTML = '<span class="ok">✅ Сессия завершена.</span>';
      updateHeader();
      if (state.mode !== "guided") bell("end");

      send("med2_finish", { at: Date.now() });
      setRunningUI();
    }

    // --- Actions ---
    $startBtn.addEventListener("click", async () => {
      await unlockAudio();

      if (state.mode === "timer" || state.mode === "guided") bell("start");
      startBg(state.bg);
      startMusic(state.music);

      const total = state.durationMin * 60;
      state.running = true;
      state.paused = false;
      state.endAt = Date.now() + total * 1000;
      state.remainingSec = total;

      $status.textContent = "⏳ Погружаемся…";
      send("med2_start", {
        duration_s: total,
        mode: state.mode,
        bg: state.bg,
        music: state.music
      });

      setRunningUI();
      updateHeader();
      startTicking();
    });

    $pauseBtn.addEventListener("click", () => {
      if (!state.running || state.paused) return;
      state.paused = true;
      state.remainingSec = Math.max(0, Math.ceil((state.endAt - Date.now())/1000));
      stopBg();
      if ($bgMusic) $bgMusic.pause();

      $status.innerHTML = '<span class="warn">⏸ Пауза</span>';
      setRunningUI();
      updateHeader();
    });

    $resumeBtn.addEventListener("click", async () => {
      if (!state.running || !state.paused) return;
      await unlockAudio();

      state.paused = false;
      state.endAt = Date.now() + (state.remainingSec * 1000);
      startBg(state.bg);
      if ($bgMusic && state.music !== "off") $bgMusic.play();

      $status.textContent = "⏳ Погружаемся…";
      setRunningUI();
      updateHeader();
    });

    $stopBtn.addEventListener("click", () => {
      if (!state.running) return;
      state.running = false;
      state.paused = false;
      stopTicking();
      stopBg();
      stopMusic();

      $status.textContent = "⏹ Остановлено";
      setRunningUI();
      updateHeader();
    });

    // --- Controls binding ---
    $durRow.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b || state.running) return;
      const min = b.getAttribute("data-min");
      if (min) {
        state.durationMin = clampInt(parseInt(min, 10), 1, 180);
        $durCustom.style.display = "none";
        $durCustomBtn.classList.remove("active");
        setActiveButtons($durRow, "data-min", String(state.durationMin));
        updateHeader();
        return;
      }
      if (b === $durCustomBtn) {
        $durCustom.style.display = ($durCustom.style.display === "none" ? "block" : "none");
        $durCustom.value = String(state.durationMin);
        $durCustomBtn.classList.add("active");
        setActiveButtons($durRow, "data-min", "__none__");
        updateHeader();
      }
    });

    $durCustom.addEventListener("change", () => {
      if (state.running) return;
      state.durationMin = clampInt(parseInt($durCustom.value || "10", 10), 1, 180);
      $durCustomBtn.classList.add("active");
      updateHeader();
    });

    $modeRow.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b || state.running) return;
      state.mode = b.getAttribute("data-mode") || state.mode;
      setActiveButtons($modeRow, "data-mode", state.mode);
    });

    $bgRow.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b || state.running) return;
      state.bg = b.getAttribute("data-bg") || state.bg;
      setActiveButtons($bgRow, "data-bg", state.bg);
    });

    $musicRow.addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b || state.running) return;
      state.music = b.getAttribute("data-music") || state.music;
      setActiveButtons($musicRow, "data-music", state.music);
    });

    $bellToggle.addEventListener("click", () => {
      if (state.running) return;
      state.bell = !state.bell;
      $bellToggle.textContent = state.bell ? "Вкл" : "Выкл";
    });

    $testSound.addEventListener("click", async () => {
      await unlockAudio();
      bell("start");
    });

    $vol.addEventListener("input", () => setVolume(parseInt($vol.value, 10)));

    // Init
    $durCustomBtn.classList.remove("active");
    $durCustom.style.display = "none";
    setActiveButtons($durRow, "data-min", String(state.durationMin));
    setActiveButtons($modeRow, "data-mode", state.mode);
    setActiveButtons($bgRow, "data-bg", state.bg);
    setActiveButtons($musicRow, "data-music", state.music);
    $bellToggle.textContent = state.bell ? "Вкл" : "Выкл";
    setVolume(state.vol);
    updateHeader();
    setRunningUI();

  })();
  </script>
</body>
</html>
